name: Continuous-Integration

on:
  pull_request:
    types:
      - auto_merge_enabled
    branches:
      - staging
  merge_group:

permissions:
  contents: read
  checks: read

env:
  EVENT: ${{ github.event_name }}
  BRANCH: ${{ github.ref }}

jobs:
  ci-tasks:
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          pytest -v --cov ./src/tests/

      - name: Build and upload to Test PyPI
        if: ${{ vars.STAGE_TO_PYPI == 'yes' && contains(env.BRANCH, 'staging') && env.EVENT == 'merge_group' }}
        env:
          TWINE_PASSWORD: ${{ secrets.TEST_PYPI_KEY }}
        run: |
          echo "📦 Installing Python dependencies."
          python -m pip install --upgrade pip
          if [ -f requirements/staging.txt ]; then
            pip install -r requirements/staging.txt
          fi

          echo "🧹 Cleaning old build artifacts."
          rm -rf build dist *.egg-info src/*.egg-info || true

          echo "🔍 Checking metadata source files."
          ls -l VERSION README.md
          echo "VERSION contents:"
          cat VERSION

          echo "🛠️ Installing build tools."
          python -m pip install --upgrade build twine

          echo "🏗️ Building package."
          python -m build

          echo "✅ Checking distributions."
          python -m twine check dist/*

          echo "🚀 Uploading to Test PyPI."
          python -m twine upload --repository testpypi dist/*

      - name: Done
        run: echo "🎉 Deployment complete!"
